# CI: compile the library and run unit tests (incl. the HMAC signature parity
# vector shared with the server and the iOS SDK). The repo intentionally ships
# without a committed Gradle wrapper binary; setup-gradle provisions Gradle so
# `gradle` is on PATH. Android SDK platform-34 is pre-installed on the runner.
name: Android CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # AGP 8.5.2 requires JDK 17+
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'
      # Unit tests first (fast fail on the signature parity vector), then the
      # release AAR to prove the library compiles.
      - run: gradle :trackhub:test --no-daemon --stacktrace
      - run: gradle :trackhub:assembleRelease --no-daemon --stacktrace
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trackhub-release-aar
          path: trackhub/build/outputs/aar/*.aar
          if-no-files-found: ignore
